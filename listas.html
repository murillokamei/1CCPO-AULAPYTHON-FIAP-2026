<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista Encadeada Simples</title>
</head>
<body>
    <h1>Lista Encadeada (versão simples)</h1>

    <input type = "text" id = "nome" placeholder = "Digite um nome">
    <button onclick="adicionar()">Adicionar</button>
    <button onclick="mostrar()">Mostrar Lista</button>
    <div id="saída"></div>
    <script>
        // "lista encadeada" simulada
        let valores = []
        let proximo = []

        let inicio = -1;
        let último = -1;

        function adicionar(){
            let nome = document.getElementById("nome").value;
            if (nome === ""){
                alert("Digite um nome");
                return;
            }
            let novoIndice = valores.length;
            valores.push(nome);
            proximo.push(-1);

            if (inicio !== -1){
                inicio=novoIndice;
                ultimo=novoIndice;
            } else {
                inicio = novoIndice;
                ultimo = novoIndice;
            }
            document.getElementById("nome").value = "";
            document.getElementById("saída").innerHTML = "Elemento adicionado!";
        }

        function mostrar(){
            let resultado ="";
            let atual = inicio;

            if (inicio === -1) {
                resultado = "lista vazia";
            }

            while(atual !== -1){
                resultado += valores[atual] + "→";
                atual = proximo[atual];
            }

            resultado += "null";

            document.getElementById("saida").innerHTML = resultado;
        }
    </script>
</body>
</html>
